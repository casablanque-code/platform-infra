# platform-infra configuration
# 1. Copy to platform.config.yml
# 2. Fill in your values
# 3. Run: bash setup.sh
#
# platform.config.yml is gitignored — never commit it.

# ── Cloudflare ────────────────────────────────────────────────────────────────
# The control plane runs on Cloudflare Workers (free tier).

cloudflare:
  account_id: ""        # Dashboard → right sidebar
  d1_database_id: ""    # wrangler d1 create platform_infra
  r2_bucket: "platform-infra-state"
  r2_endpoint: ""       # https://<account_id>.r2.cloudflarestorage.com
  r2_access_key_id: ""
  r2_secret_access_key: ""

# ── GitHub ────────────────────────────────────────────────────────────────────
# Provisioning runs via GitHub Actions on a self-hosted runner on your
# Incus server. setup.sh will print the runner registration command.

github:
  owner: ""                  # your GitHub username or org
  repo: "platform-infra"
  token: ""                  # PAT with scopes: repo, workflow
  ref: "main"

# ── Platform secrets ──────────────────────────────────────────────────────────
# Generate each with: openssl rand -hex 32

secrets:
  callback_token: ""
  admin_key: ""
  encryption_key: ""

# ── Incus ─────────────────────────────────────────────────────────────────────
# Your Incus server. The GitHub Actions self-hosted runner must run on this
# machine (or have direct network access to it).
#
# To get the token, run on your Incus server:
#   incus config trust add --name platform

incus:
  remote_addr: ""    # e.g. https://192.168.1.10:8443
  token: ""

# ── Cloudflare Zero Trust tunnels (optional) ──────────────────────────────────
# Exposes services (Portainer, Uptime Kuma, pgAdmin) without opening firewall
# ports. Leave domain blank to skip.

cloudflare_tunnel:
  api_token: ""
  account_id: ""    # same as cloudflare.account_id
  domain: ""        # e.g. example.com → https://portainer.example.com
