# platform-infra configuration
# 1. Copy to platform.config.yml
# 2. Fill in your values
# 3. Run: bash setup.sh
#
# platform.config.yml is gitignored — never commit it.

# ── Provider ──────────────────────────────────────────────────────────────────
# Which hypervisor/cloud runs your environments. Only the matching section
# below needs to be filled in.

provider:
  type: incus    # incus | proxmox | cloud

# ── Cloudflare ────────────────────────────────────────────────────────────────
# The control plane runs on Cloudflare Workers (free tier).

cloudflare:
  account_id: ""        # Dashboard → right sidebar
  d1_database_id: ""    # wrangler d1 create platform_infra
  r2_bucket: "platform-infra-state"
  r2_endpoint: ""       # https://<account_id>.r2.cloudflarestorage.com
  r2_access_key_id: ""
  r2_secret_access_key: ""

# ── GitHub ────────────────────────────────────────────────────────────────────
# Provisioning runs via GitHub Actions on a self-hosted runner. setup.sh
# will print the runner registration command for you.

github:
  owner: ""                  # your GitHub username or org
  repo: "platform-infra"
  token: ""                  # PAT with scopes: repo, workflow
  ref: "main"

# ── Platform secrets ──────────────────────────────────────────────────────────
# Generate each with: openssl rand -hex 32

secrets:
  callback_token: ""
  admin_key: ""
  encryption_key: ""

# ── Incus ─────────────────────────────────────────────────────────────────────
# Used when provider.type == incus.
#
# Leave remote_addr blank to have setup.sh install Incus on THIS machine
# (the one you're running setup.sh on) and configure everything for you.
#
# If you already have Incus running elsewhere, fill in remote_addr and
# token instead. Get the token with:
#   incus config trust add --name platform

incus:
  remote_addr: ""    # blank = auto-install locally. Or e.g. https://192.168.1.10:8443
  token: ""          # blank = auto-generated during local install

# ── Proxmox ───────────────────────────────────────────────────────────────────
# Used when provider.type == proxmox.
# NOT YET IMPLEMENTED — setup.sh will stop with an error if selected.
# Fill in when support lands; no other changes should be needed.

proxmox:
  host: ""            # e.g. https://192.168.1.20:8006
  token_id: ""         # e.g. root@pam!platform
  token_secret: ""
  node: ""             # Proxmox node name

# ── Cloud ─────────────────────────────────────────────────────────────────────
# Used when provider.type == cloud.
# NOT YET IMPLEMENTED — setup.sh will stop with an error if selected.
# Fill in when support lands; no other changes should be needed.

cloud:
  vendor: ""           # e.g. hetzner, aws
  api_token: ""
  region: ""

# ── Cloudflare Zero Trust tunnels (optional) ──────────────────────────────────
# Exposes services (Portainer, Uptime Kuma, pgAdmin) without opening firewall
# ports. Leave domain blank to skip.

cloudflare_tunnel:
  api_token: ""
  account_id: ""    # same as cloudflare.account_id
  domain: ""        # e.g. example.com → https://portainer.example.com
