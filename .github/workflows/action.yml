name: Run Action

on:
  workflow_dispatch:
    inputs:
      action_id:
        required: true
        type: string

      environment_id:
        required: true
        type: string

      environment_name:
        required: true
        type: string

      action_type:
        required: true
        type: string
        # reboot | redeploy | run_script

      public_ip:
        required: true
        type: string

      ssh_port:
        required: false
        type: string
        default: "22"

      params:
        required: false
        type: string
        default: "{}"

jobs:
  run-action:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify action started
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"started","message":"Action workflow started"}'

      # ── Mock detection ────────────────────────────────────────────────────────
      - name: Check if mock IP
        id: mock
        run: |
          IP="${{ inputs.public_ip }}"
          if echo "$IP" | grep -q "^203\.0\.113\."; then
            echo "is_mock=true" >> $GITHUB_OUTPUT
          else
            echo "is_mock=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip action (mock IP)
        if: steps.mock.outputs.is_mock == 'true'
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/complete?status=skipped" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      # ── SSH setup ─────────────────────────────────────────────────────────────
      # Uses the per-environment SSH key (not the shared BOOTSTRAP_SSH_KEY)
      # so a compromised bootstrap key doesn't grant access to nodes whose
      # bootstrap key was already rotated out of authorized_keys.
      - name: Fetch environment SSH key
        if: steps.mock.outputs.is_mock == 'false'
        run: |
          CREDS=$(curl -sf "${{ secrets.CONTROL_PLANE_URL }}/api/environments/${{ inputs.environment_id }}/ssh-credentials" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}")
          mkdir -p ~/.ssh
          echo "$CREDS" | jq -r '.ssh_private_key' > ~/.ssh/action_key
          chmod 600 ~/.ssh/action_key
          SSH_USER=$(echo "$CREDS" | jq -r '.ssh_user // "root"')
          echo "ssh_user=$SSH_USER" >> $GITHUB_ENV
          cat >> ~/.ssh/config << EOF
          Host ${{ inputs.public_ip }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/action_key
            Port ${{ inputs.ssh_port }}
          EOF

      # ── reboot ────────────────────────────────────────────────────────────────
      - name: Reboot
        if: steps.mock.outputs.is_mock == 'false' && inputs.action_type == 'reboot'
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -p ${{ inputs.ssh_port }}"
          TARGET: "${{ env.ssh_user }}@${{ inputs.public_ip }}"
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"rebooting","message":"Sending reboot command"}'
          ssh $SSH_OPTS $TARGET "sudo reboot" || true

      # ── run_script ────────────────────────────────────────────────────────────
      - name: Run script
        if: steps.mock.outputs.is_mock == 'false' && inputs.action_type == 'run_script'
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -p ${{ inputs.ssh_port }}"
          SCP_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -P ${{ inputs.ssh_port }}"
          TARGET: "${{ env.ssh_user }}@${{ inputs.public_ip }}"
        run: |
          RUNTIME_FILE="templates/${{ inputs.action_type }}/runtime.json"
          SCRIPT=$(echo '${{ inputs.params }}' | jq -r '.script // empty')
          if [ -z "$SCRIPT" ]; then
            echo "No script specified in params"; exit 1
          fi
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d "{\"type\":\"running_script\",\"message\":\"Running $SCRIPT\"}"
          scp $SCP_OPTS "$SCRIPT" "$TARGET:/tmp/$(basename $SCRIPT)"
          ssh $SSH_OPTS "$TARGET" bash -c "'
            export CONTROL_PLANE_URL=\"${{ secrets.CONTROL_PLANE_URL }}\"
            export CALLBACK_TOKEN=\"${{ secrets.CALLBACK_TOKEN }}\"
            export ENVIRONMENT_ID=\"${{ inputs.environment_id }}\"
            chmod +x /tmp/$(basename $SCRIPT)
            /tmp/$(basename $SCRIPT)
          '"

      # ── redeploy ──────────────────────────────────────────────────────────────
      - name: Redeploy
        if: steps.mock.outputs.is_mock == 'false' && inputs.action_type == 'redeploy'
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/environments/${{ inputs.environment_id }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      # ── Complete ──────────────────────────────────────────────────────────────
      - name: Complete action
        if: steps.mock.outputs.is_mock == 'false'
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"failed","message":"Action workflow failed — check GitHub Actions logs"}'

      # ── Cleanup ───────────────────────────────────────────────────────────────
      # GitHub-hosted runners are ephemeral and torn down after the job anyway,
      # but wipe the fetched private key explicitly rather than relying on that.
      - name: Wipe fetched SSH key
        if: always()
        run: rm -f ~/.ssh/action_key
