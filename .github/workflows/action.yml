name: Run Action

on:
  workflow_dispatch:
    inputs:
      action_id:
        required: true
        type: string
      action_type:
        required: true
        type: string
      environment_id:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      public_ip:
        required: true
        type: string
      ssh_port:
        required: false
        type: string
        default: "22"
      script:
        required: false
        type: string
        default: ""
      params:
        required: false
        type: string
        default: "{}"

jobs:
  run-action:
    runs-on: [self-hosted, incus-host]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify action started
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d "{\"type\":\"started\",\"message\":\"Action '${{ inputs.action_type }}' started\"}"

      - name: Fetch environment SSH key
        id: sshkey
        run: |
          mkdir -p ~/.ssh
          CREDS=$(curl -sf "${{ secrets.CONTROL_PLANE_URL }}/api/environments/${{ inputs.environment_id }}/ssh-credentials" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}")

          if [ -z "$CREDS" ]; then
            echo "No SSH credentials found for environment"
            echo "has_key=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$CREDS" | jq -r '.ssh_private_key' > ~/.ssh/action_key
          chmod 600 ~/.ssh/action_key

          SSH_USER=$(echo "$CREDS" | jq -r '.ssh_user // "ubuntu"')
          echo "ssh_user=$SSH_USER" >> $GITHUB_OUTPUT
          echo "has_key=true" >> $GITHUB_OUTPUT

          printf 'Host %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  IdentityFile ~/.ssh/action_key\n  Port %s\n' \
            "${{ inputs.public_ip }}" "${{ inputs.ssh_port }}" >> ~/.ssh/config

      # ── reboot ────────────────────────────────────────────────────────────────
      - name: Reboot
        if: inputs.action_type == 'reboot' && steps.sshkey.outputs.has_key == 'true'
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -p ${{ inputs.ssh_port }}"
          TARGET: "${{ steps.sshkey.outputs.ssh_user }}@${{ inputs.public_ip }}"
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"rebooting","message":"Sending reboot command"}'
          ssh $SSH_OPTS $TARGET "sudo reboot" || true

      # ── run_script ────────────────────────────────────────────────────────────
      - name: Run script
        if: inputs.action_type == 'run_script' && steps.sshkey.outputs.has_key == 'true'
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -p ${{ inputs.ssh_port }}"
          SCP_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/action_key -P ${{ inputs.ssh_port }}"
          TARGET: "${{ steps.sshkey.outputs.ssh_user }}@${{ inputs.public_ip }}"
        run: |
          SCRIPT="${{ inputs.script }}"
          if [ -z "$SCRIPT" ]; then
            echo "No script specified"; exit 1
          fi

          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d "{\"type\":\"running\",\"message\":\"Running $(basename $SCRIPT)\"}"

          scp $SCP_OPTS "$SCRIPT" "$TARGET:/tmp/$(basename $SCRIPT)"
          ssh $SSH_OPTS "$TARGET" bash -c "'
            export CONTROL_PLANE_URL=\"${{ secrets.CONTROL_PLANE_URL }}\"
            export CALLBACK_TOKEN=\"${{ secrets.CALLBACK_TOKEN }}\"
            export ENVIRONMENT_ID=\"${{ inputs.environment_id }}\"
            export CFZT_DOMAIN=\"${{ secrets.CFZT_DOMAIN }}\"
            export R2_ACCESS_KEY_ID=\"${{ secrets.R2_ACCESS_KEY_ID }}\"
            export R2_SECRET_ACCESS_KEY=\"${{ secrets.R2_SECRET_ACCESS_KEY }}\"
            export R2_BUCKET=\"${{ secrets.R2_BUCKET }}\"
            export R2_ENDPOINT=\"${{ secrets.R2_ENDPOINT }}\"
            chmod +x /tmp/$(basename $SCRIPT)
            /tmp/$(basename $SCRIPT)
          '"

      # ── redeploy ──────────────────────────────────────────────────────────────
      - name: Redeploy
        if: inputs.action_type == 'redeploy'
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/environments/${{ inputs.environment_id }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      - name: Complete action
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/actions/${{ inputs.action_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"failed","message":"Action workflow failed — check GitHub Actions logs"}'

      - name: Wipe SSH key
        if: always()
        run: rm -f ~/.ssh/action_key
