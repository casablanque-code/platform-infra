name: Provision Environment

run-name: "Provision Environment [${{ inputs.deployment_id }}]"

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        required: true
        type: string
      environment_id:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      provider:
        required: true
        type: string
      region:
        required: true
        type: string
      template:
        required: true
        type: string

jobs:
  provision:
    runs-on: [self-hosted, incus-host]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Notify executor started
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"github_actions_started","message":"GitHub Actions executor started"}'

      - name: Resolve runtime manifest
        id: runtime
        run: |
          RUNTIME_FILE="templates/${{ inputs.template }}/runtime.json"
          MODULE_PATH=$(jq -r '.executor.module_path' "$RUNTIME_FILE")
          HAS_BOOTSTRAP=$(jq -r 'if .post_provision then "true" else "false" end' "$RUNTIME_FILE")
          echo "module_path=$MODULE_PATH" >> $GITHUB_OUTPUT
          echo "has_bootstrap=$HAS_BOOTSTRAP" >> $GITHUB_OUTPUT

      - name: Generate tfvars
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          jq --arg env_id   "${{ inputs.environment_id }}" \
             --arg env_name "${{ inputs.environment_name }}" \
             --arg addr     "${{ secrets.INCUS_REMOTE_ADDR }}" \
             --arg token    "${{ secrets.INCUS_TOKEN }}" \
            '.runtime.tfvars + {
               environment_id:    $env_id,
               environment_name:  $env_name,
               incus_remote_addr: $addr,
               incus_token:       $token
             }' \
            "../../../providers/${{ inputs.provider }}/provider.json" \
            > terraform.tfvars.json
          jq 'del(.incus_token)' terraform.tfvars.json

      - name: Notify runtime resolved
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"runtime_resolved","message":"Template and provider resolved"}'

      - name: OpenTofu init
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.R2_BUCKET }}" \
            -backend-config="key=state/${{ inputs.environment_id }}/terraform.tfstate" \
            -backend-config="region=auto" \
            -backend-config="endpoint=${{ secrets.R2_ENDPOINT }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu apply
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu apply -auto-approve

      - name: Capture outputs
        id: outputs
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu output -json > outputs.json

          PUBLIC_IP=$(jq -r '.public_ip.value // empty' outputs.json)
          SSH_PORT=$(jq -r '.ssh_port.value // "22"' outputs.json)
          SSH_USER=$(jq -r '.ssh_user.value // "ubuntu"' outputs.json)
          SSH_PRIVATE_KEY=$(jq -r '.ssh_private_key.value // empty' outputs.json)

          echo "public_ip=$PUBLIC_IP"   >> $GITHUB_OUTPUT
          echo "ssh_port=$SSH_PORT"     >> $GITHUB_OUTPUT
          echo "ssh_user=$SSH_USER"     >> $GITHUB_OUTPUT

          # Write per-env key to disk for bootstrap steps
          if [ -n "$SSH_PRIVATE_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/env_key
            chmod 600 ~/.ssh/env_key
            printf 'Host %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  IdentityFile ~/.ssh/env_key\n  Port %s\n' \
              "$PUBLIC_IP" "$SSH_PORT" >> ~/.ssh/config
            echo "env_key_ready=true" >> $GITHUB_OUTPUT
          else
            echo "env_key_ready=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload outputs to control plane
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/outputs" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            --data @outputs.json

      - name: Wait for SSH
        if: steps.outputs.outputs.env_key_ready == 'true' && steps.runtime.outputs.has_bootstrap == 'true'
        run: |
          echo "Waiting for SSH on ${{ steps.outputs.outputs.public_ip }}:${{ steps.outputs.outputs.ssh_port }}..."
          for i in $(seq 1 30); do
            if ssh -o ConnectTimeout=5 \
                   -o StrictHostKeyChecking=no \
                   -i ~/.ssh/env_key \
                   -p ${{ steps.outputs.outputs.ssh_port }} \
                   ${{ steps.outputs.outputs.ssh_user }}@${{ steps.outputs.outputs.public_ip }} \
                   "echo ok" 2>/dev/null; then
              echo "SSH ready after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i/30, retrying in 10s..."
            sleep 10
          done
          echo "SSH never became ready"; exit 1

      - name: Run bootstrap scripts
        if: steps.outputs.outputs.env_key_ready == 'true' && steps.runtime.outputs.has_bootstrap == 'true'
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/env_key -p ${{ steps.outputs.outputs.ssh_port }}"
          SCP_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/env_key -P ${{ steps.outputs.outputs.ssh_port }}"
          TARGET: "${{ steps.outputs.outputs.ssh_user }}@${{ steps.outputs.outputs.public_ip }}"
        run: |
          RUNTIME_FILE="templates/${{ inputs.template }}/runtime.json"
          SCRIPTS=$(jq -r '.post_provision[] | select(.type == "ssh_script") | .script' "$RUNTIME_FILE")

          for SCRIPT in $SCRIPTS; do
            echo "─── Running $SCRIPT ───"
            scp $SCP_OPTS "$SCRIPT" "$TARGET:/tmp/$(basename $SCRIPT)"
            ssh $SSH_OPTS "$TARGET" bash -c "'
              export CONTROL_PLANE_URL=\"${{ secrets.CONTROL_PLANE_URL }}\"
              export CALLBACK_TOKEN=\"${{ secrets.CALLBACK_TOKEN }}\"
              export ENVIRONMENT_ID=\"${{ inputs.environment_id }}\"
              export ENV_PUBLIC_IP=\"${{ steps.outputs.outputs.public_ip }}\"
              export CFZT_API_TOKEN=\"${{ secrets.CFZT_API_TOKEN }}\"
              export CFZT_ACCOUNT_ID=\"${{ secrets.CFZT_ACCOUNT_ID }}\"
              export CFZT_DOMAIN=\"${{ secrets.CFZT_DOMAIN }}\"
              chmod +x /tmp/$(basename $SCRIPT)
              /tmp/$(basename $SCRIPT)
            '"
            echo "─── $SCRIPT done ───"
          done

          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"bootstrap_complete","message":"All bootstrap scripts executed successfully"}'

      - name: Complete deployment
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"provision_failed","message":"Workflow failed — check GitHub Actions logs"}'

      - name: Cleanup env key
        if: always()
        run: rm -f ~/.ssh/env_key
