name: Provision Environment
on:
  workflow_dispatch:
    inputs:
      deployment_id:
        required: true
        type: string

      environment_id:
        required: true
        type: string

      environment_name:
        required: true
        type: string

      provider:
        required: true
        type: string

      region:
        required: true
        type: string

      template:
        required: true
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Notify executor started
        run: |
          curl -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"github_actions_started","message":"GitHub Actions executor started"}'

      - name: Resolve runtime manifest
        id: runtime
        run: |
          TEMPLATE_PATH="templates/${{ inputs.template }}"
          RUNTIME_FILE="$TEMPLATE_PATH/runtime.json"

          echo "runtime_file=$RUNTIME_FILE" >> $GITHUB_OUTPUT

          MODULE_PATH=$(jq -r '.executor.module_path' "$RUNTIME_FILE")

          echo "module_path=$MODULE_PATH" >> $GITHUB_OUTPUT

      - name: Resolve provider runtime
        id: provider
        run: |
          PROVIDER_FILE="providers/${{ inputs.provider }}/provider.json"

          echo "provider_file=$PROVIDER_FILE" >> $GITHUB_OUTPUT

          cat "$PROVIDER_FILE"

      - name: Generate tfvars
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          jq '.runtime.tfvars' \
            "../../../providers/${{ inputs.provider }}/provider.json" \
            > terraform.tfvars.json

          cat terraform.tfvars.json

      - name: Notify runtime resolved
        run: |
          curl -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"runtime_resolved","message":"Template runtime resolved"}'

      - name: OpenTofu init
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu init

      - name: OpenTofu apply
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu apply -auto-approve

      - name: Capture outputs
        id: outputs
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu output -json > outputs.json

          cat outputs.json

      - name: Upload outputs to control plane
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          curl -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/outputs" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            --data @outputs.json

      - name: Complete deployment
        run: |
          curl -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"