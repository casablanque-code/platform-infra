name: Destroy Environment

run-name: "Destroy Environment [${{ inputs.deployment_id }}]"

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        required: true
        type: string
      environment_id:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      provider:
        required: true
        type: string
      template:
        required: true
        type: string

jobs:
  destroy:
    runs-on: [self-hosted, incus-host]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Notify started
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"destroy_started","message":"Destroy workflow started"}'

      - name: Resolve runtime manifest
        id: runtime
        run: |
          MODULE_PATH=$(jq -r '.executor.module_path' "templates/${{ inputs.template }}/runtime.json")
          echo "module_path=$MODULE_PATH" >> $GITHUB_OUTPUT

      - name: Generate tfvars
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          jq --arg env_id   "${{ inputs.environment_id }}" \
             --arg env_name "${{ inputs.environment_name }}" \
             --arg addr     "${{ secrets.INCUS_REMOTE_ADDR }}" \
             --arg token    "${{ secrets.INCUS_TOKEN }}" \
            '.runtime.tfvars + {
               environment_id:    $env_id,
               environment_name:  $env_name,
               incus_remote_addr: $addr,
               incus_token:       $token
             }' \
            "../../../providers/${{ inputs.provider }}/provider.json" \
            > terraform.tfvars.json

      - name: OpenTofu init
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.R2_BUCKET }}" \
            -backend-config="key=state/${{ inputs.environment_id }}/terraform.tfstate" \
            -backend-config="region=auto" \
            -backend-config="endpoint=${{ secrets.R2_ENDPOINT }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="force_path_style=true"

      - name: OpenTofu destroy
        working-directory: ${{ steps.runtime.outputs.module_path }}
        run: |
          tofu destroy -auto-approve

      - name: Complete destroy
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/destroy-complete" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/deployments/${{ inputs.deployment_id }}/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_TOKEN }}" \
            -d '{"type":"destroy_failed","message":"Destroy workflow failed — check GitHub Actions logs"}'
